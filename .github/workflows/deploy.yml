name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r packages/dashboard/dist/. _site/
          mkdir -p _site/navigator
          cp -r packages/navigator/dist/. _site/navigator/
          mkdir -p _site/modules/parabola/anatomy
          cp -r packages/modules/parabola-anatomy/dist/. _site/modules/parabola/anatomy/
          mkdir -p _site/modules/parabola/sort
          cp -r packages/modules/parabola-sort/dist/. _site/modules/parabola/sort/
          mkdir -p _site/modules/parabola/cards
          cp -r packages/modules/parabola-cards/dist/. _site/modules/parabola/cards/

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: generic

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4